name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: i3spacecr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: i3spacecr.azurecr.io/i3space-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Next steps — deploy to Container App
        run: |
          echo ""
          echo "✅ Image pushed to ACR: i3spacecr.azurecr.io/i3space-backend:latest"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  TO DEPLOY (run locally or ask an Owner to run once):"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  az containerapp update \\"
          echo "    --name i3space-backend \\"
          echo "    --resource-group rg-shared-prod \\"
          echo "    --image i3spacecr.azurecr.io/i3space-backend:latest"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  TO ENABLE AUTO-DEPLOY ON PUSH (one-time setup by Owner):"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  1. Ask mujtaba.syed@i3institute.ca (Owner) to run:"
          echo "     az role assignment create \\"
          echo "       --assignee <SP-app-id> \\"
          echo "       --role Contributor \\"
          echo "       --resource-group rg-shared-prod"
          echo ""
          echo "  2. Then in Azure Portal → i3space-backend → Settings → Deployment"
          echo "     → Continuous deployment → connect Sahilvohra58/i3-space (main)"
          echo "     → Azure Container Registry: i3spacecr / i3space-backend"
          echo "     → Dockerfile: ./backend/Dockerfile"
          echo "     → Click 'Start continuous deployment'"
          echo ""
          echo "  After step 2, every push to main auto-deploys. No manual step needed."
          echo ""
